<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 우리 수업은 - 로그인</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 로그인 화면 -->
    <div class="login-screen">
        <div class="login-container">
            <div class="login-header">
                <div class="logo">🎓</div>
                <h1 class="login-brand">오늘 우리 수업은</h1>
                <h2 class="login-class">3학년 2반</h2>
                <p class="login-greeting">오늘도 열심히</p>
            </div>
            <div class="login-form">
                <div class="form-group">
                    <label>닉네임</label>
                    <input type="text" id="studentName" placeholder="닉네임을 입력하세요">
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="studentPassword" placeholder="비밀번호를 입력하세요">
                </div>
                <button class="btn-primary" onclick="login()">로그인</button>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const name = document.getElementById('studentName').value;
            const password = document.getElementById('studentPassword').value;
            
            if (name && password) {
                // 세션 저장
                sessionStorage.setItem('studentName', name);
                // 홈으로 이동
                window.location.href = 'home.html';
            } else {
                alert('닉네임과 비밀번호를 모두 입력해주세요.');
            }
        }
        
        // Enter 키로 로그인
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('studentPassword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    login();
                }
            });
        });
    </script>
</body>
</html>
