<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과학 - 화산 활동</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-container">
        <div class="detail-header science">
            <button class="back-btn" onclick="window.location.href='home.html'">← 돌아가기</button>
            <div class="detail-title">
                <div class="subject-tag science-tag">🔬 과학</div>
                <div class="textbook-name">과학 4-1(강석진)</div>
                <div class="lesson-title-main">[5차시] 4. 화산 활동으로 어떤 물질이 나올까요?</div>
                <div class="lesson-pages-main">과68~69쪽, 실관41쪽</div>
                <div class="unit-name">3. 땅의 변화</div>
            </div>
        </div>

        <div class="detail-content">
            <div class="goal-section">
                <h3>🎯 학습 목표</h3>
                <p>화산 활동으로 나오는 물질의 종류와 특징을 설명할 수 있어요.</p>
            </div>

            <div class="materials-section">
                <h3>📚 오늘 활동</h3>
                <div class="activity-list">
                    <a href="#" class="activity-item" onclick="openLessonImage(event)">
                        <div class="activity-number">1</div>
                        <div class="activity-content">
                            <span class="activity-icon">🔬</span>
                            <span class="activity-name">차시 수업</span>
                        </div>
                        <span class="activity-arrow">→</span>
                    </a>
                    <a href="https://www.youtube.com/watch?v=Fr5n_yhjcDA" target="_blank" class="activity-item">
                        <div class="activity-number">2</div>
                        <div class="activity-content">
                            <span class="activity-icon">🎬</span>
                            <span class="activity-name">화산활동 영상</span>
                        </div>
                        <span class="activity-arrow">→</span>
                    </a>
                    <a href="science-quiz.html" class="activity-item">
                        <div class="activity-number">3</div>
                        <div class="activity-content">
                            <span class="activity-icon">✏️</span>
                            <span class="activity-name">샘퀴즈 - 마무리 퀴즈</span>
                        </div>
                        <span class="activity-arrow">→</span>
                    </a>
                    <a href="science-review.html" class="activity-item activity-review">
                        <div class="activity-number">4</div>
                        <div class="activity-content">
                            <span class="activity-icon">❓</span>
                            <span class="activity-name">학습 리뷰</span>
                        </div>
                        <span class="activity-arrow">→</span>
                    </a>
                </div>
            </div>

            <div class="teacher-notice">
                <div class="notice-header">
                    <span class="notice-icon">📢</span>
                    <span class="notice-title">선생님 알림</span>
                </div>
                <div class="notice-content">
                    <div class="notice-item">
                        <span class="notice-label">준비물</span>
                        <span class="notice-text">연습장 준비하세요.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 이미지 모달 -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage" src="https://www.genspark.ai/api/files/s/vt9a6t5a" alt="차시 수업">
    </div>

    <script>
        // 로그인 확인
        if (!sessionStorage.getItem('studentName')) {
            window.location.href = 'index.html';
        }

        // 차시 수업 이미지 모달 열기
        function openLessonImage(event) {
            event.preventDefault();
            document.getElementById('imageModal').style.display = 'flex';
        }

        // 모달 닫기
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
